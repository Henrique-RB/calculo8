<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <h1>Multiplique um vetor por 5</h1>
        <p>Digite 8 números. Depois clique em "Mostrar resultado" para ver o vetor multiplicado por 5.</p>
        <div id="input-area">
            <input id="inpNumber" type="number" placeholder="Digite um número" />
            <button id="btnAdd">Adicionar número</button>
        </div>
        <p id="msg">Você já adicionou 0 de 8 números.</p>
        <button id="btnM5" disabled>Mostrar vetor multiplicado por 5</button>
        <div id="result"></div>
    </main>

    <script src="./src/script.js"></script>
</body>
</html>
